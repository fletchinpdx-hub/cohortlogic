<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign up — Cohort Logic</title>
  <link rel="stylesheet" href="css/marketing.css" />
</head>
<body class="auth-page page-enter">

<div class="nav-wrap">
  <div class="container nav">
    <a href="index.html" class="logo-mark">
      <svg width="26" height="26" viewBox="0 0 64 64" aria-hidden="true">
        <circle cx="16" cy="22" r="5" fill="#2A9D8F"/>
        <path d="M9 32 Q9 28 16 28 Q23 28 23 32 L21 50 L11 50 Z" fill="#2A9D8F"/>
        <circle cx="48" cy="22" r="5" fill="#E9B949"/>
        <path d="M41 32 Q41 28 48 28 Q55 28 55 32 L53 50 L43 50 Z" fill="#4FA8E0"/>
        <circle cx="32" cy="18" r="6.5" fill="#1E3A5F"/>
        <path d="M23 28 Q23 24 32 24 Q41 24 41 28 L44 56 L20 56 Z" fill="#1E3A5F"/>
      </svg>
      <span class="wordmark">Cohort<span style="font-weight:400;opacity:.85"> Logic</span></span>
    </a>
    <div class="nav-actions">
      <a href="login.html" style="font-size:14px;color:var(--text-2);padding:8px 12px;">Already have an account? Sign in</a>
    </div>
  </div>
</div>

<div class="auth-body">
  <div class="auth-card" style="max-width:480px;">
    <h1>Create your account</h1>
    <p class="auth-subtitle">Free through September 2026. No credit card needed.</p>

    <div id="auth-error" class="auth-error"></div>
    <div id="auth-success" class="auth-success"></div>

    <form class="auth-form" id="signup-form" novalidate>
      <div class="field">
        <label for="full-name">Your name</label>
        <input type="text" id="full-name" autocomplete="name" placeholder="First and last name" required />
      </div>
      <div class="field">
        <label for="email">Work email</label>
        <input type="email" id="email" autocomplete="email" placeholder="you@yourschool.org" required />
      </div>
      <div class="field">
        <label for="school-name">School or district name</label>
        <input type="text" id="school-name" autocomplete="organization" placeholder="Lincoln Elementary" required />
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" autocomplete="new-password" placeholder="At least 8 characters" required minlength="8" />
        <div style="height:4px;border-radius:2px;margin-top:6px;background:#e5e7eb;overflow:hidden;">
          <div id="pw-bar" style="height:100%;width:0;border-radius:2px;transition:width .2s,background .2s;"></div>
        </div>
        <div id="pw-label" style="font-size:11px;margin-top:4px;min-height:16px;"></div>
      </div>
      <div style="font-size:12px;color:var(--text-3);margin-top:-6px;">
        Your school's data is encrypted, school-isolated, and accessible only to approved staff. <a href="privacy.html" style="color:var(--teal-deep);">Privacy policy →</a>
      </div>
      <button type="submit" class="btn btn-primary btn-full" id="submit-btn">
        Create account <span class="arrow">→</span>
      </button>
    </form>

    <div class="auth-footer">
      Already have an account? <a href="login.html">Sign in</a>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-config.js"></script>
<script>
  // Password strength indicator
  document.getElementById('password').addEventListener('input', function () {
    const pw  = this.value;
    const bar = document.getElementById('pw-bar');
    const lbl = document.getElementById('pw-label');
    if (!pw) { bar.style.width = '0'; lbl.textContent = ''; return; }
    let score = 0;
    if (pw.length >= 8)              score++;
    if (pw.length >= 12)             score++;
    if (/[0-9]/.test(pw))            score++;
    if (/[^a-zA-Z0-9]/.test(pw))    score++;
    const cfg = [
      { w: '20%',  bg: '#ef4444', text: 'Too short' },
      { w: '40%',  bg: '#f97316', text: 'Weak' },
      { w: '65%',  bg: '#eab308', text: 'Fair' },
      { w: '85%',  bg: '#22c55e', text: 'Good' },
      { w: '100%', bg: '#16a34a', text: 'Strong' },
    ][Math.min(score, 4)];
    bar.style.width      = cfg.w;
    bar.style.background = cfg.bg;
    lbl.style.color      = cfg.bg;
    lbl.textContent      = cfg.text;
  });

  document.getElementById('signup-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn       = document.getElementById('submit-btn');
    const errorEl   = document.getElementById('auth-error');
    const successEl = document.getElementById('auth-success');
    const fullName   = document.getElementById('full-name').value.trim();
    const email      = document.getElementById('email').value.trim();
    const schoolName = document.getElementById('school-name').value.trim();
    const password   = document.getElementById('password').value;

    errorEl.classList.remove('visible');
    successEl.classList.remove('visible');

    if (!fullName || !email || !schoolName) {
      errorEl.textContent = 'Please fill in all fields.';
      errorEl.classList.add('visible');
      return;
    }
    if (password.length < 8) {
      errorEl.textContent = 'Password must be at least 8 characters.';
      errorEl.classList.add('visible');
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Creating account…';

    // 1. Create Supabase auth user — profile is auto-created by DB trigger
    const { data, error } = await SupabaseClient.auth.signUp({
      email,
      password,
      options: {
        data: { full_name: fullName, school_name: schoolName },
        emailRedirectTo: 'https://cohortlogic.com/login.html',
      }
    });

    if (error) {
      errorEl.textContent = error.message;
      errorEl.classList.add('visible');
      btn.disabled = false;
      btn.innerHTML = 'Create account <span class="arrow">→</span>';
      return;
    }

    // 2. Show two-step pending message
    document.getElementById('signup-form').style.display = 'none';
    successEl.innerHTML = `
      <div class="pending-card">
        <div class="pending-icon">📬</div>
        <strong style="font-size:16px;color:var(--navy-deep);">One more step — check your email</strong>
        <p style="color:var(--text-2);">We sent a confirmation link to <strong>${email}</strong>. Click it to verify your address.</p>
        <p style="color:var(--text-2);margin-top:8px;">Once verified, your account will be reviewed for approval. We'll reach out when you're all set.</p>
        <p style="font-size:13px;color:var(--text-3);margin-top:10px;">Didn't get it? Check your spam folder.</p>
      </div>
    `;
    successEl.classList.add('visible');
  });
</script>
</body>
</html>
