<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Building Schedule Builder — Cohort Logic</title>
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="stylesheet" href="css/schedule.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
</head>
<body style="visibility:hidden">
  <div id="app">

    <!-- Sidebar -->
    <aside id="sidebar">
      <div id="logo">
        <span class="logo-icon">📅</span>
        <span class="logo-text">Schedule Builder</span>
      </div>

      <nav id="nav">
        <div class="nav-section-label">PHASE 1 — SETUP</div>
        <a class="nav-item active" data-view="school">
          <span class="nav-icon">🏫</span> School Info
        </a>
        <a class="nav-item" data-view="staff">
          <span class="nav-icon">👥</span> Staff Roster
        </a>
        <a class="nav-item" data-view="blocks">
          <span class="nav-icon">🟦</span> Block Types
        </a>

        <div class="nav-section-label">PHASE 1 — BUILD</div>
        <a class="nav-item" data-view="master">
          <span class="nav-icon">📋</span> Master Schedule
        </a>

        <div class="nav-section-label">PHASE 2 — DETAIL</div>
        <a class="nav-item nav-item-locked" data-view="specials">
          <span class="nav-icon">🎨</span> Specials
        </a>
        <a class="nav-item nav-item-locked" data-view="ia">
          <span class="nav-icon">🧑‍🏫</span> IA Schedule
        </a>

        <div class="nav-section-label">FINISH</div>
        <a class="nav-item nav-item-locked" data-view="export">
          <span class="nav-icon">📤</span> Export
        </a>
      </nav>

      <div id="sidebar-status">
        <div class="status-item" id="status-school">
          <span class="status-dot"></span>
          <span id="status-school-text">No school info yet</span>
        </div>
        <div class="status-item" id="status-staff">
          <span class="status-dot"></span>
          <span id="status-staff-text">No staff added</span>
        </div>
        <div class="status-item" id="status-blocks">
          <span class="status-dot"></span>
          <span id="status-blocks-text">Block types</span>
        </div>
      </div>

      <div class="sidebar-footer">
        <button class="btn-download-file btn-download-unsaved" id="download-sched-btn" title="Download your schedule file to save permanently">
          ↓ Download Schedule File
        </button>
        <a href="#" class="sidebar-link" id="load-sched-link">Load a .clsched file…</a>
        <a href="#" class="sidebar-link" id="load-cohort-link">Import from Class Builder…</a>
        <input type="file" id="load-cohort-input" accept=".cohort" style="display:none" />
        <a href="dashboard.html" class="sidebar-link">← Back to dashboard</a>
      </div>
      <input type="file" id="load-sched-file" accept=".clsched,.json" style="display:none">
    </aside>

    <!-- Main content -->
    <main id="main">
      <div id="view-school"  class="view active"></div>
      <div id="view-staff"   class="view"></div>
      <div id="view-blocks"  class="view"></div>
      <div id="view-master"  class="view view-full"></div>
      <div id="view-specials" class="view"></div>
      <div id="view-ia"      class="view"></div>
      <div id="view-export"  class="view"></div>
    </main>
  </div>

  <script src="js/supabase-config.js?v=49"></script>
  <script src="js/schedule-state.js?v=49"></script>
  <script src="js/schedule-setup.js?v=49"></script>
  <script src="js/schedule-grid.js?v=49"></script>
  <script src="js/schedule-init.js?v=49"></script>
</body>
</html>
