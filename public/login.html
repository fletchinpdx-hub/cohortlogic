<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign in — Cohort Logic</title>
  <link rel="stylesheet" href="css/marketing.css" />
</head>
<body class="auth-page page-enter">

<div class="nav-wrap">
  <div class="container nav">
    <a href="index.html" class="logo-mark">
      <svg width="26" height="26" viewBox="0 0 64 64" aria-hidden="true">
        <circle cx="16" cy="22" r="5" fill="#2A9D8F"/>
        <path d="M9 32 Q9 28 16 28 Q23 28 23 32 L21 50 L11 50 Z" fill="#2A9D8F"/>
        <circle cx="48" cy="22" r="5" fill="#E9B949"/>
        <path d="M41 32 Q41 28 48 28 Q55 28 55 32 L53 50 L43 50 Z" fill="#4FA8E0"/>
        <circle cx="32" cy="18" r="6.5" fill="#1E3A5F"/>
        <path d="M23 28 Q23 24 32 24 Q41 24 41 28 L44 56 L20 56 Z" fill="#1E3A5F"/>
      </svg>
      <span class="wordmark">Cohort<span style="font-weight:400;opacity:.85"> Logic</span></span>
    </a>
  </div>
</div>

<div class="auth-body">
  <div class="auth-card">
    <h1>Sign in</h1>
    <p class="auth-subtitle">Welcome back. Enter your email and password.</p>

    <div id="auth-error" class="auth-error"></div>

    <!-- Normal login form -->
    <form class="auth-form" id="login-form" novalidate>
      <div class="field">
        <label for="email">Work email</label>
        <input type="email" id="email" autocomplete="email" placeholder="you@yourschool.org" required />
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" autocomplete="current-password" placeholder="••••••••" required />
      </div>
      <div style="text-align:right;margin-top:-8px;margin-bottom:4px;">
        <a href="#" id="forgot-link" style="font-size:13px;color:var(--teal-deep);">Forgot password?</a>
      </div>
      <button type="submit" class="btn btn-primary btn-full" id="submit-btn">
        Sign in <span class="arrow">→</span>
      </button>
    </form>

    <!-- Forgot password form (hidden by default) -->
    <form class="auth-form hidden" id="forgot-form" novalidate>
      <p style="font-size:14px;color:var(--text-2);margin-bottom:16px;">Enter your email and we'll send a reset link.</p>
      <div class="field">
        <label for="reset-email">Work email</label>
        <input type="email" id="reset-email" autocomplete="email" placeholder="you@yourschool.org" required />
      </div>
      <button type="submit" class="btn btn-primary btn-full" id="reset-btn">
        Send reset link <span class="arrow">→</span>
      </button>
      <div style="text-align:center;margin-top:12px;">
        <a href="#" id="back-to-login" style="font-size:13px;color:var(--teal-deep);">Back to sign in</a>
      </div>
    </form>

    <!-- Set new password form (shown when recovery token is in URL) -->
    <form class="auth-form hidden" id="reset-form" novalidate>
      <p style="font-size:14px;color:var(--text-2);margin-bottom:16px;">Choose a new password for your account.</p>
      <div class="field">
        <label for="new-password">New password</label>
        <input type="password" id="new-password" autocomplete="new-password" placeholder="At least 8 characters" required />
      </div>
      <div class="field">
        <label for="confirm-password">Confirm password</label>
        <input type="password" id="confirm-password" autocomplete="new-password" placeholder="••••••••" required />
      </div>
      <button type="submit" class="btn btn-primary btn-full" id="set-pwd-btn">
        Set new password <span class="arrow">→</span>
      </button>
    </form>

    <div class="auth-footer" id="auth-footer-links">
      Don't have an account? <a href="signup.html">Sign up free</a>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-config.js"></script>
<script src="js/login.js"></script>
</body>
</html>
